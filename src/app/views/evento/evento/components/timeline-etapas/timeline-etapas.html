<div class="timeline-container">
  <div class="timeline-controls">
    <button 
      class="btn btn-sm btn-icon btn-outline-secondary" 
      (click)="resetZoom()" 
      title="Resetear zoom y posición"
    >
      <ng-icon name="lucideRotateCcw" size="18" />
    </button>
    <small class="text-muted">🖱️ Ctrl+Scroll para zoom • Arrastra para mover</small>
  </div>

  <div class="timeline-track">
    <svg
      #timelineSvg
      class="timeline-svg"
      [attr.viewBox]="'0 0 ' + (etapasOrdenadas.length * 140) + ' 240'"
      preserveAspectRatio="xMidYMid meet"
    >
      <defs>
        <!-- Marcador de flecha naranja -->
        <marker
          id="arrowhead"
          markerWidth="6"
          markerHeight="6"
          refX="6"
          refY="2"
          orient="auto"
        >
          <polygon points="0 0, 6 2, 0 4" fill="#ffa500" />
        </marker>

        <!-- Marcador de flecha roja para rollback -->
        <marker
          id="arrowhead-rollback"
          markerWidth="6"
          markerHeight="6"
          refX="6"
          refY="2"
          orient="auto"
        >
          <polygon points="0 0, 6 2, 0 4" fill="#e74c3c" />
        </marker>
      </defs>

      <!-- Línea base -->
      <line
        x1="50"
        y1="70"
        [attr.x2]="etapasOrdenadas.length > 1 ? (etapasOrdenadas.length - 1) * 140 + 50 : 50"
        y2="70"
        class="timeline-line"
      />

      <!-- Flechas principales -->
      <ng-container *ngFor="let etapa of etapasOrdenadas; let i = index">
        <ng-container *ngIf="!isLastEtapa(etapa)">
          <!-- Flecha hacia la siguiente etapa -->
          <line
            [attr.x1]="i * 140 + 100"
            y1="70"
            [attr.x2]="(i + 1) * 140 + 30"
            y2="70"
            class="arrow-line"
            [attr.marker-end]="'url(#arrowhead)'"
          />
        </ng-container>

        <!-- Rollback si existe (manejo de secuencia negativa) -->
        <ng-container *ngIf="hasRollback(etapa)">
          <!-- Rollback con ID (secuencia negativa) -->
          <ng-container *ngIf="etapa.rollback!.secuencia < 0">
            <!-- Línea curva hacia la etapa target (si existe) -->
            <ng-container *ngIf="getRollbackTargetIndex(etapa) && getRollbackTargetIndex(etapa)! >= 0">
              <path
                [attr.d]="
                  'M ' + (i * 140 + 70) + ',70 ' +
                  'Q ' + ((i * 140 + 70 + getRollbackTargetIndex(etapa)! * 140 + 70) / 2) + ',30 ' +
                  (getRollbackTargetIndex(etapa)! * 140 + 70) + ',70'
                "
                class="rollback-line-curved"
                [attr.marker-end]="'url(#arrowhead-rollback)'"
              />
            </ng-container>

            <!-- Etiqueta de rollback debajo de la etapa -->
            <g [attr.transform]="'translate(' + (i * 140 + 70) + ', 170)'">
              <rect
                x="-32"
                y="-10"
                width="64"
                height="20"
                rx="3"
                class="rollback-label-bg"
              />
              <text
                x="0"
                y="4"
                text-anchor="middle"
                class="rollback-label-text"
              >
                {{ etapa.rollback!.nombre }}
              </text>
            </g>
          </ng-container>

          <!-- Rollback por secuencia positiva (compatibilidad) -->
          <ng-container *ngIf="etapa.rollback!.secuencia > 0">
            <path
              [attr.d]="
                'M ' + (i * 140 + 70) + ',50 Q ' + (i * 140 + 70) + ',20 ' +
                ((etapa.rollback!.secuencia - 1) * 140 + 70) + ',20'
              "
              class="rollback-line-curved"
              [attr.marker-end]="'url(#arrowhead-rollback)'"
            />
          </ng-container>
        </ng-container>
      </ng-container>

      <!-- Nodos de etapas -->
      <ng-container *ngFor="let etapa of etapasOrdenadas; let i = index">
        <g [ngClass]="'etapa-grupo'">
          <!-- Círculo de la etapa -->
          <circle
            [attr.cx]="i * 140 + 70"
            cy="70"
            r="25"
            [ngClass]="getEtapaClase(etapa)"
          />

          <!-- Icono dentro del círculo -->
          <g [attr.transform]="'translate(' + (i * 140 + 70) + ', 70)'">
            <text
              class="etapa-numero"
              x="0"
              y="7"
              text-anchor="middle"
              *ngIf="etapa.deAutoriza"
            >
              ✓
            </text>
            <text
              class="etapa-numero"
              x="0"
              y="7"
              text-anchor="middle"
              *ngIf="!etapa.deAutoriza && !etapa.deArchivo"
            >
              {{ etapa.secuencia }}
            </text>
            <text
              class="etapa-numero"
              x="0"
              y="7"
              text-anchor="middle"
              *ngIf="etapa.deArchivo"
            >
              📁
            </text>
          </g>
        </g>

        <!-- Etiqueta de la etapa -->
        <text
          [attr.x]="i * 140 + 70"
          y="115"
          text-anchor="middle"
          class="etapa-label"
        >
          {{ etapa.nombre }}
        </text>

        <!-- Información del rol -->
        <text
          [attr.x]="i * 140 + 70"
          y="132"
          text-anchor="middle"
          class="etapa-rol"
        >
          {{ etapa.rolPreferido }}
        </text>
      </ng-container>
    </svg>
  </div>

  <!-- Leyenda -->
  <div class="timeline-legend">
    <div class="legend-item">
      <div class="legend-box autoriza"></div>
      <span>Requiere autorización</span>
    </div>
    <div class="legend-item">
      <div class="legend-box archivo"></div>
      <span>Etapa de archivo</span>
    </div>
    <div class="legend-item">
      <div class="legend-box actual"></div>
      <span>Etapa actual</span>
    </div>
    <div class="legend-item">
      <div class="legend-line rollback"></div>
      <span>Rollback</span>
    </div>
  </div>
</div>
