    <span class="visually-hidden">Loading...</span>
  </div>
</div>
}

<div class="wrapper">
  <app-topbar />

  <app-sidenav />

  <div class="content-page">

    <app-shortcut-table />

    <app-greeting-banner />

</div>

<!-- Drawers globales -->
<app-drawer-container></app-drawer-container>
